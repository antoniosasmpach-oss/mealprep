function GroceryView({dayIdx}){

  const[lo,setLo]=useState("A");const[dn,setDn]=useState("A");
  const keys=Object.keys(ing);
  const hasLA=keys.includes("lunchA")&&keys.includes("lunchB");
  const hasDA=keys.includes("dinnerA")&&keys.includes("dinnerB");
  let active=[];keys.forEach(k=>{if(k==="lunchA"&&lo!=="A")return;if(k==="lunchB"&&lo!=="B")return;if(k==="dinnerA"&&dn!=="A")return;if(k==="dinnerB"&&dn!=="B")return;active.push(ing[k]);});
  const merged=mergeItems(active.flatMap(m=>m.items));
  const grouped={};CAT_ORDER.forEach(c=>{grouped[c]=[];});merged.forEach(i=>{if(grouped[i.cat])grouped[i.cat].push(i);});
  return(<div>
    {hasLA&&<div style={{marginBottom:12}}><div style={{fontSize:11,color:"#888780",marginBottom:6,fontWeight:500,textTransform:"uppercase",letterSpacing:0.5}}>Lunch</div><div style={{display:"flex",gap:6}}>{["A","B"].map(o=>(<button key={o} onClick={()=>setLo(o)} style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:lo===o?600:400,background:lo===o?"#2C2C2A":"#F1EFE8",color:lo===o?"#fff":"#5F5E5A"}}>{o==="A"?ing.lunchA.name:ing.lunchB.name}</button>))}</div></div>}
    {hasDA&&<div style={{marginBottom:16}}><div style={{fontSize:11,color:"#888780",marginBottom:6,fontWeight:500,textTransform:"uppercase",letterSpacing:0.5}}>Dinner</div><div style={{display:"flex",gap:6}}>{["A","B"].map(o=>(<button key={o} onClick={()=>setDn(o)} style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:dn===o?600:400,background:dn===o?"#2C2C2A":"#F1EFE8",color:dn===o?"#fff":"#5F5E5A"}}>{o==="A"?ing.dinnerA.name:ing.dinnerB.name}</button>))}</div></div>}
    <div style={{fontSize:12,color:"#888780",marginBottom:12}}>{merged.length} items total</div>
    {CAT_ORDER.map(cat=>{const items=grouped[cat];if(!items.length)return null;const cc=CAT_COLORS[cat];return(<div key={cat} style={{marginBottom:16}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><Pill text={CAT_LABELS[cat]} bg={cc.bg} color={cc.c}/><span style={{fontSize:11,color:"#B4B2A9"}}>{items.length}</span></div>{items.map((it,i)=>(<div key={i} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"0.5px solid rgba(128,128,128,0.08)",fontSize:13}}><span>{it.n}</span><span style={{color:"#888780",fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap",marginLeft:12}}>{it.amt%1===0?it.amt:it.amt.toFixed(1)} {it.u}</span></div>))}</div>);})}
    <div style={{marginTop:8,fontSize:11,color:"#B4B2A9",lineHeight:1.5}}>Batch meals show full 4-day quantities (raw weights).</div>
  </div>);
}

function ChecklistView({dayIdx}){
  const d=dayIdx+1;const ing=INGREDIENTS[d];const alerts=PREP_ALERTS[d]||[];
  const[checked,setChecked]=useState({});const[remaining,setRemaining]=useState(0);const[timerActive,setTimerActive]=useState(false);
  const endRef=useRef(null);const intRef=useRef(null);
  const allItems=mergeItems(Object.values(ing).flatMap(m=>m.items));
  const grouped={};CAT_ORDER.forEach(c=>{grouped[c]=[];});allItems.forEach(i=>{if(grouped[i.cat])grouped[i.cat].push(i);});
  const total=allItems.length;const done=Object.values(checked).filter(Boolean).length;
  const toggle=useCallback(n=>setChecked(p=>({...p,[n]:!p[n]})),[]);
  const startTimer=useCallback(mins=>{if(intRef.current)clearInterval(intRef.current);const end=Date.now()+mins*60000;endRef.current=end;setRemaining(mins*60);setTimerActive(true);intRef.current=setInterval(()=>{const left=Math.max(0,Math.round((endRef.current-Date.now())/1000));setRemaining(left);if(left<=0){clearInterval(intRef.current);intRef.current=null;setTimerActive(false);try{const ctx=new(window.AudioContext||window.webkitAudioContext)();[0,300,600].forEach(dl=>{const o=ctx.createOscillator();const g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=880;g.gain.value=0.3;o.start(ctx.currentTime+dl/1000);o.stop(ctx.currentTime+dl/1000+0.15);});}catch(e){}alert("Prep reminder! Check ingredients for Day "+d);}},1000);},[d]);
  const cancelTimer=useCallback(()=>{if(intRef.current)clearInterval(intRef.current);intRef.current=null;setTimerActive(false);setRemaining(0);},[]);
  useEffect(()=>()=>{if(intRef.current)clearInterval(intRef.current);},[]);
  const fmt=s=>Math.floor(s/60)+":"+String(s%60).padStart(2,"0");
  return(<div>
    {alerts.length>0&&<div style={{marginBottom:16}}>{alerts.map((a,i)=>(<div key={i} style={{padding:"10px 12px",borderRadius:10,background:"#FAEEDA",marginBottom:6}}><div style={{fontSize:13,fontWeight:500,color:"#633806"}}>{a.text}</div><div style={{fontSize:11,color:"#854F0B",marginTop:2}}>{a.when}{a.mins?` · ${a.mins} min`:""}{a.cond?` · ${a.cond}`:""}</div></div>))}</div>}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}><div><span style={{fontSize:14,fontWeight:500}}>{done}/{total}</span><span style={{fontSize:12,color:"#888780",marginLeft:6}}>items ready</span></div><button onClick={()=>setChecked({})} style={{fontSize:12,padding:"4px 12px",borderRadius:8,border:"0.5px solid rgba(128,128,128,0.2)",background:"transparent",color:"#888780",cursor:"pointer"}}>Reset</button></div>
    <div style={{height:4,borderRadius:2,background:"#F1EFE8",marginBottom:16,overflow:"hidden"}}><div style={{height:"100%",borderRadius:2,background:done===total?"#1D9E75":"#378ADD",width:`${(done/total)*100}%`,transition:"width 0.3s"}}/></div>
    {CAT_ORDER.map(cat=>{const items=grouped[cat];if(!items.length)return null;const cc=CAT_COLORS[cat];return(<div key={cat} style={{marginBottom:14}}><div style={{marginBottom:6}}><Pill text={CAT_LABELS[cat]} bg={cc.bg} color={cc.c}/></div>{items.map((it,i)=>{const ck=!!checked[it.n];return(<div key={i} onClick={()=>toggle(it.n)} style={{display:"flex",alignItems:"center",gap:10,padding:"9px 0",borderBottom:"0.5px solid rgba(128,128,128,0.08)",cursor:"pointer",WebkitTapHighlightColor:"transparent"}}><div style={{width:22,height:22,borderRadius:6,flexShrink:0,border:ck?"none":"1.5px solid rgba(128,128,128,0.3)",background:ck?"#1D9E75":"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"}}>{ck&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2.5 6L5 8.5L9.5 3.5" stroke="white" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>}</div><span style={{flex:1,fontSize:13,textDecoration:ck?"line-through":"none",color:ck?"#B4B2A9":"inherit",transition:"all 0.15s"}}>{it.n}</span><span style={{fontSize:12,color:"#B4B2A9",fontVariantNumeric:"tabular-nums",whiteSpace:"nowrap"}}>{it.amt%1===0?it.amt:it.amt.toFixed(1)} {it.u}</span></div>);})}</div>);})}
    <div style={{marginTop:20,padding:"14px",borderRadius:12,border:"0.5px solid rgba(128,128,128,0.15)",background:"#F1EFE8"}}><div style={{fontSize:12,fontWeight:500,color:"#5F5E5A",marginBottom:10}}>Prep reminder</div>{timerActive?(<div style={{textAlign:"center"}}><div style={{fontSize:28,fontWeight:600,fontVariantNumeric:"tabular-nums",color:"#2C2C2A",margin:"8px 0"}}>{fmt(remaining)}</div><button onClick={cancelTimer} style={{fontSize:13,padding:"8px 24px",borderRadius:20,border:"none",cursor:"pointer",background:"#FCEBEB",color:"#A32D2D",fontWeight:500}}>Cancel</button></div>):(<div style={{display:"flex",gap:6}}>{[15,30,60,120].map(m=>(<button key={m} onClick={()=>startTimer(m)} style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:500,background:"#2C2C2A",color:"#fff"}}>{m<60?m+" min":m/60+" hr"}</button>))}</div>)}</div>
  </div>);
}

function App(){
  const[dayIdx,setDayIdx]=useState(0);const[isGym,setIsGym]=useState(false);const[tab,setTab]=useState("schedule");
  const navItems=[
    {id:"schedule",label:"Schedule",icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>},
    {id:"groceries",label:"Groceries",icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18"/><path d="M16 10a4 4 0 01-8 0"/></svg>},
    {id:"checklist",label:"Checklist",icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>}
  ];
  return(<div style={{fontFamily:"'DM Sans',-apple-system,sans-serif",maxWidth:480,margin:"0 auto",color:"#2C2C2A",minHeight:"100vh",paddingBottom:80}}>
    <div style={{position:"sticky",top:0,zIndex:10,background:"#fff",paddingTop:"max(env(safe-area-inset-top),12px)",paddingBottom:8,borderBottom:"0.5px solid rgba(128,128,128,0.1)"}}>
      <div style={{padding:"0 16px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <div><div style={{fontSize:10,fontWeight:600,letterSpacing:1.4,color:"#B4B2A9",textTransform:"uppercase"}}>Sittas 2.2</div><div style={{fontSize:20,fontWeight:600,letterSpacing:-0.5}}>Day {dayIdx+1}</div></div>
          {tab==="schedule"&&<button onClick={()=>setIsGym(!isGym)} style={{padding:"6px 14px",borderRadius:20,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,transition:"all 0.2s",background:isGym?"#FCEBEB":"#E1F5EE",color:isGym?"#A32D2D":"#085041"}}>{isGym?"Gym day":"Rest day"}</button>}
        </div>
        <div style={{display:"flex",gap:4}}>{[0,1,2,3].map(i=>(<button key={i} onClick={()=>setDayIdx(i)} style={{flex:1,padding:"8px 0",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:dayIdx===i?600:400,transition:"all 0.15s",background:dayIdx===i?"#2C2C2A":"#F1EFE8",color:dayIdx===i?"#fff":"#5F5E5A"}}>Day {i+1}</button>))}</div>
      </div>
    </div>
    <div style={{padding:"16px 16px 0"}}>
      {tab==="schedule"&&<ScheduleView dayIdx={dayIdx} isGym={isGym}/>}
      {tab==="groceries"&&<GroceryView dayIdx={dayIdx}/>}
      {tab==="checklist"&&<ChecklistView dayIdx={dayIdx}/>}
    </div>
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:20,background:"#fff",borderTop:"0.5px solid rgba(128,128,128,0.15)",display:"flex",justifyContent:"center",paddingBottom:"max(env(safe-area-inset-bottom),8px)"}}>
      <div style={{display:"flex",maxWidth:480,width:"100%"}}>{navItems.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:"10px 0 8px",border:"none",cursor:"pointer",background:"transparent",fontSize:11,fontWeight:tab===t.id?600:400,color:tab===t.id?"#2C2C2A":"#B4B2A9",transition:"color 0.15s",borderTop:tab===t.id?"2px solid #2C2C2A":"2px solid transparent",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>{t.icon}{t.label}</button>))}</div>
    </div>
    <div style={{padding:"16px",textAlign:"center",fontSize:10,color:"#B4B2A9",marginTop:16}}>1722 kcal/day · 143P · 187C · 52F · 34 fibre</div>
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js');}
</script>
</body>
